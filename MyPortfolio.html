<!DOCTYPE html>
<html>

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>CarlJames</title>
</head>
<style>
	body {
		padding: 0;
		margin: 0;
		height: 100vh;
		width: 100%;
	}
	*{
		font-family: Verdana, Geneva, Tahoma, sans-serif;
	}
	section{
		border-image: fill 0 linear-gradient(#0001, #000);
		background-image: url(/3b277b41f0e2a93d913ff8f2a81f525c.jpg);
		background-size: cover;
		background-position:top;
		min-height: 100vh;
		width: 100%;
		display: flex;
		align-items: center;
		justify-content: center;
	}
	.intro{
		display: flex;
		align-items: center;
		justify-content: center;
	}
	.intro p{
		color: beige;
		font-weight: bold;
		position: relative;
		bottom: 300px;
		right: 200px;
		font-size: 35px;
		text-align: center;
	}
	.intro h1 {
		text-align: center;
		text-transform: uppercase;
		left: 250px;
		font-weight: bold;
		font-size: 50px;
		position: relative;
		bottom: 550px;
		color: transparent;
		-webkit-text-stroke: 1px 
		beige;
		}
	nav {
		backdrop-filter: blur(20px);
		z-index: 9999;
		display: flex;
		align-items: center;
		justify-content: center;
		height: 50px;
		width: 100%;
		box-shadow: 0px 0px 10px;
		position: fixed;
		top: 0%;
	}
	ul{
		display: flex;
		align-items: center;
		justify-content: center;
		gap: 20px;
		position: relative;
		left: 10%;
		list-style: none;
	}
	li a{
		font-size: 10px;
		text-decoration: none;
		font-weight: bold;
		color: beige;
	}
	.box {
		background-image: url(/3b277b41f0e2a93d913ff8f2a81f525c.jpg);
		min-height: 100vh;
		width: 100%;
		display: flex;
		align-items: center;
		justify-content: center;
	}

	.box1 {
		height: auto;
		width: 200px;
		flex-wrap: wrap;
		gap: 30px;
		display: flex;
		align-items: center;
		justify-content: center;
		flex-direction: row;
	}
	.anak1 {
		transform: translateY(300px);
		transition: 1s;
		height: 200px;
		width: 200px;
		box-shadow: 0px 0px 10px;
		opacity: 0;
		
	}
	.anak2 {
		transform: translateY(300px);
		transition: 1s;
		height: 200px;
		width: 200px;
		box-shadow: 0px 0px 10px;
		opacity: 0;
	}
	.anak3 {
		transform: translateY(300px);
		transition: 1s;
		transition-delay: 2s;
		height: 200px;
		width: 200px;
		box-shadow: 0px 0px 10px;
		opacity: 0;
	}
	.anak1.show{
		transform: translateY(0px);
		opacity: 1;
		background-image: url(/bg.jpg);
		background-size: cover;
		background-position: center;
	}
	.anak2.show{
		transform: translateY(0px);
		opacity: 1;
	}
	.anak3.show {
		transform: translateY(0px);
		opacity: 1;
	}
</style>

<body>
	
	<section id="home">
		<nav>
			<ul>
				<li><a onclick="home()">About Me</a></li>
				<li><a onclick="services()">Services</a></li>
				<li><a href="">Testimonials</a></li>
				<li><a href="">Contact Me</a></li>
			</ul>
		</nav>
		<div class="intro">
			<h1>hey, im james carl</h1>
		    <p>
			   Welcome to my portfolio,<br> I'm the former web design<br> champion on 11th CSS day.
		    </p>
		</div>
	</section>
	<div class="box" id="service">
		<div class="box1">
			<div class="anak1"></div>
			<div class="anak2"></div>
			<div class="anak3"></div>
		</div>
	</div>
	<script>
	function services(){
		document.getElementById("service").scrollIntoView({behavior: "smooth"});
	}
	
	function home(){
		document.getElementById("home").scrollIntoView({behavior: "smooth"});
		
		setTimeout(() => {
			location.reload();
		}, 800);
	}
	
	const observer = new IntersectionObserver((entries) => {
	entries.forEach(entry => {
		
		if (entry.isIntersecting) {
			entry.target.classList.add("show");
		}

	});
});

const hiddenElements = document.querySelectorAll(".anak1, .anak2, .anak3");

hiddenElements.forEach(el => observer.observe(el));
</script>
</body>

</html>
